    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const lazyImages = document.querySelectorAll(".lazyload");
            const imageOptions = {
                root: null,
                rootMargin: '100px 0px', 
                threshold: 0.01 
            };

            if ("IntersectionObserver" in window) {
                const loadImage = (image) => {
                    
                    image.classList.add("lazyloading");
                    
                    const img = new Image();
                    img.src = image.dataset.src;
                    img.onload = () => {
                        
                        image.src = image.dataset.src;
                        image.classList.remove("lazyload");
                        image.classList.remove("lazyloading");
                        image.classList.add("lazyloaded");
                        
                        
                        image.offsetHeight;
                    };
                    
                    
                    img.onerror = () => {
                        image.classList.remove("lazyloading");
                        console.log("图片加载失败:", image.dataset.src);
                    };
                };

                const handleIntersection = (entries, observer) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            loadImage(entry.target);
                            observer.unobserve(entry.target);
                            
                            
                            let currentItem = entry.target.closest('.gallery-item');
                            let nextItem = currentItem?.nextElementSibling;
                            
                            
                            if (nextItem) {
                                const nextImage = nextItem.querySelector('.lazyload');
                                if (nextImage) {
                                    const preloadImage = new Image();
                                    preloadImage.src = nextImage.dataset.src;
                                }
                                
                                
                                let nextNextItem = nextItem.nextElementSibling;
                                if (nextNextItem) {
                                    const nextNextImage = nextNextItem.querySelector('.lazyload');
                                    if (nextNextImage) {
                                        setTimeout(() => {
                                            const preloadNextImage = new Image();
                                            preloadNextImage.src = nextNextImage.dataset.src;
                                        }, 200); 
                                    }
                                }
                            }
                        }
                    });
                };

                const observer = new IntersectionObserver(handleIntersection, imageOptions);
                lazyImages.forEach(img => observer.observe(img));
            } else {
                
                const loadImagesImmediately = () => {
                    lazyImages.forEach(image => {
                        image.src = image.dataset.src;
                        image.classList.remove("lazyload");
                        image.classList.add("lazyloaded");
                    });
                };
                loadImagesImmediately();
            }
        });
    </script>
